services:
  backend:
    build: ./backend
    container_name: esbot-backend-app
    volumes:
      - ./backend:/backend
    working_dir: /backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://esbot_user:esbot_password@db:5432/esbot
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: esbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: esbot
      POSTGRES_USER: esbot_user
      POSTGRES_PASSWORD: esbot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: